<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta CEP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card-custom {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .card-header h2 {
            margin: 0;
            font-weight: bold;
        }

        .btn-custom {
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
        }

        #resultado {
            display: none;
        }

        .info-item {
            padding: 10px;
            border-radius: 10px;
            background: #f8f9fa;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="card card-custom">

        <div class="card-header">
            <h2>
                <i class="bi bi-geo-alt-fill"></i>
                Consulta CEP
            </h2>
            <p class="mb-0">Digite um CEP para buscar o endereço</p>
        </div>

        <div class="card-body p-4">

            <div class="mb-3">
                <label class="form-label fw-bold">
                    CEP
                </label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-search"></i>
                    </span>

                    <input
                        type="text"
                        id="myInput"
                        class="form-control"
                        placeholder="Ex: 01001000"
                        maxlength="9">
                </div>
            </div>

            <button onclick="myFunction()" class="btn btn-primary btn-custom">
                <i class="bi bi-search"></i>
                Buscar CEP
            </button>

            <div id="resultado" class="mt-4">

                <h5 class="mb-3 text-primary">
                    <i class="bi bi-house-fill"></i>
                    Resultado da Consulta
                </h5>

                <div class="info-item">
                    <strong>CEP:</strong>
                    <span id="cep"></span>
                </div>

                <div class="info-item">
                    <strong>Logradouro:</strong>
                    <span id="logradouro"></span>
                </div>

                <div class="info-item">
                    <strong>Bairro:</strong>
                    <span id="bairro"></span>
                </div>

                <div class="info-item">
                    <strong>Cidade:</strong>
                    <span id="cidade"></span>
                </div>

                <div class="info-item">
                    <strong>Estado:</strong>
                    <span id="estado"></span>
                </div>

            </div>

        </div>

    </div>

    <script>

        async function myFunction() {

            let cep = document.getElementById("myInput").value
            let resultado = document.getElementById("resultado")

            cep = cep.replace(/\D/g, "")

            if (cep.length !== 8) {
                alert("Digite um CEP válido!")
                return
            }

            try {

                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
                const data = await response.json()

                if (data.erro) {
                    alert("CEP não encontrado!")
                    return
                }

                document.getElementById("cep").innerHTML = data.cep
                document.getElementById("logradouro").innerHTML = data.logradouro
                document.getElementById("bairro").innerHTML = data.bairro
                document.getElementById("cidade").innerHTML = data.localidade
                document.getElementById("estado").innerHTML = data.uf

                resultado.style.display = "block"

            } catch (error) {

                alert("Erro ao buscar CEP!")
                console.log(error)

            }

        }

    </script>

</body>

</html>
